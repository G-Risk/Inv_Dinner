<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Small Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-navy: #0B132B;
            --deep-night: #1C2541;
            --soft-beige: #EAE0D5;
            --warm-white: #FDFBF7;
        }

        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, var(--dark-navy) 0%, var(--deep-night) 100%);
            z-index: -1;
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--soft-beige);
            font-family: 'Inter', sans-serif;
            text-align: center;
            overflow-x: hidden; 
        }

        h1 {
            font-family: 'Lora', serif;
            font-weight: 400;
            color: var(--warm-white);
            font-size: clamp(1.8rem, 6vw, 2.5rem); 
            letter-spacing: 0.5px;
            line-height: 1.4;
            padding: 0 20px;
            margin: 0;
        }

        .scroll-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }

        .scroll-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Icon Styling --- */
        .decor-icon {
            color: rgba(234, 224, 213, 0.5); 
            margin-bottom: 20px;
            width: 32px;
            height: 32px;
        }

        .inline-icon {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 12px; /* Slightly increased spacing for left-alignment */
            color: rgba(234, 224, 213, 0.7);
        }

        .note p {
            font-size: 1.15rem;
            line-height: 1.8;
            font-weight: 300;
            padding: 0 15px;
            margin: 10px 0;
        }

        /* --- Side-by-Side Layout --- */
        .split-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }

        .split-left {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .split-right {
            flex: 1;
            text-align: left;
        }

        .split-right .decor-icon {
            margin: 0 0 15px 0;
        }

        /* --- Details Card --- */
        .details {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(234, 224, 213, 0.1);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 350px;
            backdrop-filter: blur(5px);
        }

        .venue-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
            opacity: 0.9;
            border: 1px solid rgba(234, 224, 213, 0.2);
        }

        /* CHANGED: Aligned to flex-start (left) instead of center */
        .details p {
            margin: 12px 0;
            font-size: 1.1rem;
            color: var(--warm-white);
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            text-align: left;
        }

        .maps-link {
            color: var(--warm-white);
            text-decoration: none;
            border-bottom: 1px solid rgba(234, 224, 213, 0.4);
            padding-bottom: 2px;
            transition: border-color 0.3s;
        }

        .maps-link:hover {
            border-color: var(--warm-white);
        }

        /* --- Text & Ask Section --- */
        .ask {
            font-size: 1.4rem;
            font-family: 'Lora', serif;
            font-style: italic;
            color: var(--warm-white);
            margin-top: 0;
        }

        .touch {
            margin-top: 15px;
            font-size: 1rem;
            color: rgba(234, 224, 213, 0.6);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .scroll-indicator {
            margin-top: 50px;
            color: rgba(234, 224, 213, 0.4);
            animation: bounce 2.5s infinite;
        }

        /* --- Buttons --- */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        button {
            background: transparent;
            border: 1px solid var(--soft-beige);
            color: var(--soft-beige);
            padding: 15px 20px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover, button:active {
            background: var(--soft-beige);
            color: var(--dark-navy);
        }

        .btn-secondary {
            border-color: rgba(234, 224, 213, 0.3);
            color: rgba(234, 224, 213, 0.6);
        }

        .btn-secondary:hover, .btn-secondary:active {
            background: rgba(234, 224, 213, 0.1);
            color: var(--warm-white);
            border-color: rgba(234, 224, 213, 0.6);
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
                gap: 30px; /* Added a bit more breathing room on mobile */
            }
            .split-left {
                justify-content: center;
                width: 90%;
            }
            .split-right {
                text-align: left; /* Changed to left-align on mobile too, for consistency */
                padding: 0 25px; /* Matched padding to align with the card's visual edge */
            }
            .split-right .decor-icon {
                margin: 0 0 15px 0; 
            }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="scroll-section visible">
        <svg class="decor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"></path>
        </svg>
        
        <h1>An evening I’d like to share with you.</h1>
        
        <div class="scroll-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
        </div>
    </div>

    <div class="scroll-section note">
        <svg class="decor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
            <line x1="6" y1="1" x2="6" y2="4"></line>
            <line x1="10" y1="1" x2="10" y2="4"></line>
            <line x1="14" y1="1" x2="14" y2="4"></line>
        </svg>

        <p>You’ve been pretty busy lately.</p>
        <p>Thought it might be nice to slow down for a bit.</p>
    </div>

    <div class="scroll-section">
        <div class="split-container">
            
            <div class="split-left">
                <div class="details">
                    <img src="venue.jpg" alt="Kale Locale" class="venue-img">
                    <p>
                        <svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <strong><a href="https://www.google.com/maps/place/Kale+Locale/@-7.5709371,110.7915064,1185m/data=!3m2!1e3!4b1!4m6!3m5!1s0x2e7a15c3a8b7bb7f:0x48ce6560ba4de8e3!8m2!3d-7.5709371!4d110.7940813!16s%2Fg%2F11l2gj8ypy?entry=ttu&g_ep=EgoyMDI2MDQxNC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="maps-link">Kale Locale</a></strong>
                    </p>
                    <p>
                        <svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Tonight at 7:00 PM
                    </p>
                </div>
            </div>

            <div class="split-right">
                <svg class="decor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <p class="ask">If you feel like it, I’d love to take you.</p>
                <p class="touch">No pressure—just a small invitation.</p>
            </div>
            
        </div>
    </div>

    <div class="scroll-section">
        <div class="actions">
            <button onclick="respond('yes')">Sounds nice</button>
            <button class="btn-secondary" onclick="respond('no')">Maybe another time</button>
        </div>
    </div>

    <script>
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.4 
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-section').forEach(section => {
            observer.observe(section);
        });

        function respond(answer) {
            if(answer === 'yes') {
                alert('I am glad! See you soon 😊');
            } else {
                alert('No worries at all. Have a beautifully restful week 🌙');
            }
        }
    </script>
</body>
</html>
